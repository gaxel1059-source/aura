services:
  - type: web
    name: aura-api
    runtime: node
    plan: free
    buildCommand: >-
      npx pnpm@11.10.0 install --frozen-lockfile &&
      npx pnpm@11.10.0 --filter @workspace/api-server run build &&
      BASE_PATH=/ npx pnpm@11.10.0 --filter @workspace/tiktok-clone run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_SECRET
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: PRIVATE_OBJECT_DIR
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
